name: Build MSI

on:
  workflow_dispatch:
  push:
    paths:
      - "index.html"
      - "product.html"
      - "cart.html"
      - "payment.html"
      - "tracking.html"
      - "style.css"
      - "shop.js"
      - "assets/**"
      - "installer/**"
      - ".github/workflows/build-msi.yml"

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build MSI
        run: dotnet build installer/WeasleysInstaller.wixproj -c Release -p:Platform=x64

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WEASLEYS-WIZARD-WHEEZES-Setup
          path: installer/bin/**/*.msi
