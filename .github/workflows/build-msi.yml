name: Build MSI installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-msi:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset --version=3.11.2 -y
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          echo "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File ".\build-msi.ps1"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WEASLEYS_WIZARD_WHEEZES_Setup
          path: dist/WEASLEYS_WIZARD_WHEEZES_Setup.msi
          if-no-files-found: error
