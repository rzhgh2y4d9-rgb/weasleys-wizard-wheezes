$ErrorActionPreference = "Stop"

$RootDir = Split-Path -Parent $MyInvocation.MyCommand.Path
$InstallerDir = Join-Path $RootDir "installer"
$BuildDir = Join-Path $RootDir "build"
$StageDir = Join-Path $BuildDir "package"
$DistDir = Join-Path $RootDir "dist"

$ProductWxs = Join-Path $InstallerDir "Product.wxs"
$AppFilesWxs = Join-Path $BuildDir "AppFiles.wxs"
$MsiPath = Join-Path $DistDir "WEASLEYS_WIZARD_WHEEZES_Setup.msi"

if (-not (Test-Path $ProductWxs)) {
    throw "File not found: $ProductWxs"
}

Remove-Item -Recurse -Force $BuildDir -ErrorAction SilentlyContinue
Remove-Item -Recurse -Force $DistDir -ErrorAction SilentlyContinue

New-Item -ItemType Directory -Force -Path $BuildDir | Out-Null
New-Item -ItemType Directory -Force -Path $StageDir | Out-Null
New-Item -ItemType Directory -Force -Path $DistDir | Out-Null

$ItemsToCopy = @(
    "assets",
    "index.html",
    "cart.html",
    "payment.html",
    "product.html",
    "tracking.html",
    "shop.js",
    "style.css",
    "README.md",
    "README.txt"
)

foreach ($Item in $ItemsToCopy) {
    $SourcePath = Join-Path $RootDir $Item
    $TargetPath = Join-Path $StageDir $Item

    if (Test-Path $SourcePath) {
        Copy-Item -Path $SourcePath -Destination $TargetPath -Recurse -Force
    }
}

Get-ChildItem -Path $RootDir -File | Where-Object {
    $_.Extension -in @(".docx", ".doc", ".pdf", ".txt")
} | ForEach-Object {
    Copy-Item -Path $_.FullName -Destination $StageDir -Force
}

$IndexPath = Join-Path $StageDir "index.html"
if (-not (Test-Path $IndexPath)) {
    throw "index.html was not copied to package folder"
}

$heat = (Get-Command "heat.exe" -ErrorAction SilentlyContinue).Source
$candle = (Get-Command "candle.exe" -ErrorAction SilentlyContinue).Source
$light = (Get-Command "light.exe" -ErrorAction SilentlyContinue).Source

if (-not $heat -or -not $candle -or -not $light) {
    $PossibleWixDirs = @(
        "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
        "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin",
        "${env:ProgramFiles}\WiX Toolset v3.14\bin",
        "${env:ProgramFiles}\WiX Toolset v3.11\bin"
    )

    foreach ($Dir in $PossibleWixDirs) {
        if (Test-Path (Join-Path $Dir "heat.exe")) {
            $env:PATH = "$Dir;$env:PATH"
            break
        }
    }

    $heat = (Get-Command "heat.exe" -ErrorAction SilentlyContinue).Source
    $candle = (Get-Command "candle.exe" -ErrorAction SilentlyContinue).Source
    $light = (Get-Command "light.exe" -ErrorAction SilentlyContinue).Source
}

if (-not $heat) { throw "heat.exe was not found" }
if (-not $candle) { throw "candle.exe was not found" }
if (-not $light) { throw "light.exe was not found" }

Write-Host "Using heat: $heat"
Write-Host "Using candle: $candle"
Write-Host "Using light: $light"

& $heat dir $StageDir -cg AppFiles -dr INSTALLFOLDER -srd -sreg -gg -var var.SourceDir -out $AppFilesWxs

& $candle "-dSourceDir=$StageDir" -out "$BuildDir\" $ProductWxs $AppFilesWxs

$WixObjFiles = Get-ChildItem -Path $BuildDir -Filter "*.wixobj" | ForEach-Object { $_.FullName }

if ($WixObjFiles.Count -eq 0) {
    throw "No .wixobj files were created"
}

& $light -ext WixUIExtension -out $MsiPath $WixObjFiles

if (-not (Test-Path $MsiPath)) {
    throw "MSI was not created"
}

Write-Host "MSI created successfully:"
Write-Host $MsiPath
